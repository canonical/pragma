---
# SideNavigation.Item — a single, flat navigation row rendered from a NavItem.
# A leaf item (has `url`) renders as a link; a key-only item renders as a
# non-navigable label. The row is NOT recursive — tree traversal lives in
# NavTree (level-1 groups → level-2 items). Identity follows getItemId: `url`
# when present, otherwise `key`.
node:
  uri: apps.subcomponent.side-navigation-item
  styles:
    layout.type: stack
    layout.direction: column
    size.width: fill
  edges:
    # The row: a link (navigable, has url) or a label (key-only). Laid out on the
    # shared SideNavigation row grid — [start] [label] [end] — so the leading
    # icon aligns with the header logo.
    - node:
        # NOTE: colour/visual state (base/hover/active backgrounds, text/icon
        # colour) is intentionally NOT wired in PR1 (structure only). It lands in
        # PR2 via token pairings; the tokens below record the intended target.
        # The DSL limitation still applies — `appearance.background` expresses one
        # value, but the row needs distinct base/hover/active; recorded here as
        # base only until the Anatomy DSL accepts per-state token values.
        role: row
        styles:
          layout.type: flow
          layout.direction: row
          layout.align: center
          interaction.cursor: pointer
          spacing.padding.vertical: dimension/150
          spacing.gap: dimension/100
          appearance.background: color/foreground/navigation/primary
          typography.text: typography/text/primary
          typography.color: color/text
        edges:
          # Start slot — leading icon. Always reserved (empty when absent) so
          # labels align whether or not a row has an icon.
          - node:
              role: icon
              styles:
                appearance.color: color/icon
            relation:
              cardinality: "0..1"
              slotName: icon
          - node:
              role: label
              styles:
                layout.flex: 1
            relation:
              cardinality: "1"
              slotName: label
          # End slot — derived from the item's internal kind: an item with
          # subitems shows a disclosure caret (static in PR1; toggle behaviour
          # deferred); a leaf shows its optional `slot` (e.g. a badge) or nothing.
          - switch:
              "on": internal
              cases:
                - node:
                    role: caret
                - node:
                    role: slot
            relation:
              cardinality: "0..1"
              slotName: end
      relation:
        cardinality: "1"
        slotName: default
