---
node:
  uri: global.subcomponent.side-navigation-content
  styles:
    layout.type: stack
    layout.direction: column
    layout.flex: 1
    layout.overflow: auto
    size.width: fill
  edges:
    - node:
        role: nav item list
        styles:
          layout.type: stack
          layout.direction: column
          size.width: fill
        edges:
          - node:
              uri: global.subcomponent.side-navigation-item
            relation:
              cardinality: "0..*"
      relation:
        cardinality: "1"
        slotName: default
