---
# ContentLayout — apps-tier layout: the responsive content grid of a view.
# Lays its children (default slot) on one of the design system's grid
# presets from @canonical/styles, selected by the `grid` prop:
# "responsive" (default — fixed-responsive breakpoint columns, 4/8/12) or
# "intrinsic" (fluid auto-fill in groups of four minmax(--grid-col-min, 1fr)
# columns). Children are direct grid items and may span via
# grid-column/grid-row. The grid-mode switch is a style variant, not a node
# alternative, so it is recorded here rather than as a DSL switch.
node:
  uri: apps.layout.content_layout
  styles:
    layout.type: grid
    spacing.gap: grid/gutter
  edges:
    - node:
        role: content item
      relation:
        cardinality: "0..*"
        slotName: default
