name: "Publish to chromatic"
on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        description: The directory where Storybook should be published from
        type: string
      externals:
        required: true
        description: A JSON array string of external paths, relative to the working directory, that should cause a full re-build when changed.
        type: string
        default: "[]"
    secrets:
      CHROMATIC_PROJECT_TOKEN:
        required: true
        description: Chromatic project token for publishing
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.working-directory }}
  cancel-in-progress: true
jobs:
  publish-to-chromatic:
    if: >-
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'no visual change')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve build command
        id: build
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "cmd=bunx nx affected -t build:all --base=origin/${{ github.event.pull_request.base.ref }} --head=HEAD" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=bunx nx affected -t build:all --base=HEAD~1 --head=HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          build-command: ${{ steps.build.outputs.cmd }}

      - name: Publish to Chromatic
        uses: chromaui/action@v16
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          workingDir: ${{ inputs.working-directory }}
          buildScriptName: "build:storybook"
          onlyChanged: true
          externals: ${{ inputs.externals }}
          autoAcceptChanges: ${{ github.event_name == 'push' }}
