name: "ds-demo-site/chromatic"
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    paths:
      - configs/storybook/**
      - packages/styles/**
      - packages/utils/**
      - packages/react/ds-global/**
      - apps/react/demo/**
      - "!packages/react/ds-global/**/*.stories.*"
      - "!**/*.test.*"
      - "!**/*.md"
      - "!**/*.mdx"
  push:
    branches:
      - main
    paths:
      - configs/storybook/**
      - packages/styles/**
      - packages/utils/**
      - packages/react/ds-global/**
      - apps/react/demo/**
      - "!packages/react/ds-global/**/*.stories.*"
      - "!**/*.test.*"
      - "!**/*.md"
      - "!**/*.mdx"
jobs:
  test-compile:
    uses: ./.github/workflows/chromatic._template.yml
    secrets:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_TOKEN_CANONICAL_DS_DEMO_SITE }}
    with:
      working-directory: apps/react/demo
      externals: '[
        "configs/storybook/**",
        "packages/styles/**/!(*.test.*|*.stories.*|*.md|*.mdx)",
        "packages/utils/**/!(*.test.*|*.stories.*|*.md|*.mdx)",
        "packages/react/ds-global/**/!(*.test.*|*.stories.*|*.md|*.mdx)"
      ]'
