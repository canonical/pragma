name: "Pull request"
on:
  pull_request:

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        bun-version: ['1.3.9']
        # Node 20 EOL is April 2026. Testing on 22 (LTS) and 24 (current).
        node-version: ['22', '24']
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          bun-version: ${{ matrix.bun-version }}
          node-version: ${{ matrix.node-version }}
          build-command: bunx nx affected -t build:all --base=origin/${{ github.event.pull_request.base.ref }} --head=HEAD

      - name: Code quality checks
        run: bunx nx affected -t check --base=origin/${{ github.event.pull_request.base.ref }} --head=HEAD

      - name: Test
        run: bunx nx affected -t test --base=origin/${{ github.event.pull_request.base.ref }} --head=HEAD

  # ADVISORY (non-blocking) for now: this job has no `needs:` and build-gate
  # does not depend on it, so a red consumer-smoke cannot block a merge yet.
  # It proves the published packages are installable and usable by an
  # EXTERNAL npm consumer (pack -> install -> tsc -> vite build -> SSR
  # render/hydrate). Once it is reliably green on main it flips to required
  # by adding it to build-gate's `needs:`.
  consumer-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env
        with:
          # Lighter than build:all — the smoke only needs package dists,
          # not Storybook builds.
          build-command: bunx nx run-many -t build --projects="$(bun scripts/consumer-smoke/list-publishable.ts)"

      - name: Unit tests for the consumer-smoke scripts
        run: bun test scripts/consumer-smoke

      - name: Static guard — published packages must not depend on private/unpublished packages
        run: bun scripts/consumer-smoke/check-no-private-deps.ts

      - name: Pack, install, and exercise packages in an external consumer app
        # Keep the smoke signal visible even when the static guard is red.
        if: ${{ !cancelled() }}
        run: bun scripts/consumer-smoke/pack-and-smoke.ts

  build-gate:
    runs-on: ubuntu-latest
    # NOTE: consumer-smoke is intentionally NOT in `needs:` while it is
    # advisory. Flipping it to required means adding it here.
    needs: build-matrix
    if: ${{ success() }}
    steps:
      - name: All checks passed
        run: echo "All build matrix jobs completed successfully"
