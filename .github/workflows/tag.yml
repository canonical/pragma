name: Update package versions
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release type. If not 'stable', the current version will be bumped as a pre-release instead of a stable release."
        # TODO change default to stable after 1.0.0 is out
        default: "experimental"
        required: false
        type: choice
        options:
          - "experimental"
          - "alpha"
          - "beta"
          - "rc"
          - "stable"
env:
  MAIN_BRANCH: "refs/heads/main"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Validate input
        run: |
          if [[ "${{ github.ref }}" != "${{ env.MAIN_BRANCH }}" ]]; then
            echo "This action can only be run on the main branch"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env

  check:
    name: Code quality checks
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Code quality checks
        run: bun run check

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 1

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Test
        run: bun run test

  version:
    name: Bump package versions
    runs-on: ubuntu-latest
    needs: [check, test]
    outputs:
      VERSION: ${{ steps.lerna_version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Bump package versions, commit, tag, and push to Git
        id: lerna_version
        uses: ./.github/actions/lerna-version
        with:
          release_type: ${{ github.event.inputs.release_type }}

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs: version
    # OIDC trusted publishing: GitHub mints a short-lived npm token at publish
    # time instead of using a long-lived NPM_AUTH_TOKEN secret.
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: v${{ needs.version.outputs.VERSION }}
          fetch-depth: 0

      - name: Setup Environment
        uses: ./.github/actions/setup-env

      - name: Setup Node, authenticate with NPM registry
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish packages
        # Route pre-releases to a dist-tag named after their pre-release
        # identifier (e.g. 0.30.0-experimental.1 -> "experimental") so they
        # never take over npm's `latest`; stable releases go to `latest`.
        env:
          VERSION: ${{ needs.version.outputs.VERSION }}
        run: |
          if [[ -z "$VERSION" ]]; then
            echo "Error: VERSION output from the version job is empty; refusing to publish."
            exit 1
          fi
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE="${VERSION#*-}"
            DIST_TAG="${PRERELEASE%%.*}"
          else
            DIST_TAG="latest"
          fi
          echo "Publishing $VERSION to dist-tag '$DIST_TAG'"
          lerna publish --yes --no-private --dist-tag "$DIST_TAG" from-package
