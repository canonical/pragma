name: "react-tokens/chromatic"
on:
  pull_request:
    paths:
      - configs/storybook/**
      - packages/ds-assets/**
      - packages/styles/**
      - packages/utils/**
      - packages/react/tokens/**
  push:
    branches:
      - main
    paths:
      - configs/storybook/**
      - packages/ds-assets/**
      - packages/styles/**
      - packages/utils/**
      - packages/react/tokens/**
jobs:
  test-compile:
    uses: ./.github/workflows/chromatic._template.yml
    secrets:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_TOKEN_CANONICAL_REACT_TOKENS }}
    with:
      working-directory: packages/react/tokens
      externals: '[
        "configs/storybook/**",
        "packages/ds-assets/**",
        "packages/styles/**",
        "packages/utils/**"
      ]'
