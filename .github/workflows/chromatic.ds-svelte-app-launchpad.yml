name: "svelte-ds-app-launchpad/chromatic"
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
    paths:
      - configs/storybook/**
      - packages/ds-assets/**
      - packages/tokens/**
      - packages/styles/**
      - packages/utils/**
      # TODO: Uncomment once the launchpad package consumes ds-global
      # - packages/svelte/ds-global/**
      - packages/svelte/ds-app-launchpad/**
      - "!**/*.test.*"
      - "!**/*.md"
  push:
    branches:
      - main
    paths:
      - configs/storybook/**
      - packages/ds-assets/**
      - packages/tokens/**
      - packages/styles/**
      - packages/utils/**
      # TODO: Uncomment once the launchpad package consumes ds-global
      # - packages/svelte/ds-global/**
      - packages/svelte/ds-app-launchpad/**
      - "!**/*.test.*"
      - "!**/*.md"
jobs:
  test-compile:
    uses: ./.github/workflows/chromatic._template.yml
    secrets:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_TOKEN_CANONICAL_SVELTE_DS_APP_LAUNCHPAD }}
    with:
      working-directory: packages/svelte/ds-app-launchpad
      # TODO: Add packages/svelte/ds-global once the launchpad package consumes ds-global
      externals: '[
        "configs/storybook/**",
        "packages/ds-assets/**",
        "packages/tokens/**/!(*.test.*|*.stories.*|*.md|*.mdx)",
        "packages/styles/**/!(*.test.*|*.stories.*|*.md|*.mdx)",
        "packages/utils/**/!(*.test.*|*.stories.*|*.md|*.mdx)"
      ]'
