name: Setup environment
description: Installs build tools, restores caches, and installs dependencies
inputs:
  bun-version:
    default: '1.3.9'
    description: Version of Bun to use
  node-version:
    # Node is required for Storybook and Lerna (Bun is used as package manager only)
    # Storybook 10 supports Node 20.16+, 22.19+, or 24+
    default: '24'
    description: Version of Node to use
  build-target:
    default: ''
    description: 'Lerna build target to run after install (e.g. "build", "build:all"). Leave empty to skip.'
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache node_modules
      uses: actions/cache@v4
      with:
        path: node_modules
        key: node-modules-${{ runner.os }}-${{ inputs.node-version }}-${{ hashFiles('bun.lock') }}

    - name: Cache Bun global cache
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}

    - name: Cache Nx remote cache
      uses: actions/cache@v4
      with:
        path: /tmp/nx-remote-cache
        key: nx-remote-cache-${{ runner.os }}-${{ inputs.node-version }}-${{ github.sha }}

    - name: Install dependencies
      shell: bash
      # NOTE: --frozen-lockfile disabled for now due to a known Bun bug where bun install
      # always writes the lockfile internally, causing false positives with --frozen-lockfile
      # even when bun.lock content is unchanged. Tracked in:
      # https://github.com/oven-sh/bun/issues/16692
      # https://github.com/oven-sh/bun/issues/19088
      # run: bun install --frozen-lockfile
      #
      # --ignore-scripts prevents the "prepare" lifecycle hook from triggering a full
      # monorepo build during install. Workflows that need a build invoke it explicitly
      # or rely on Nx transitive dependsOn.
      run: bun install --ignore-scripts && git diff --exit-code bun.lock

      # Workaround for https://github.com/oven-sh/bun/issues/19782
      # Workspace bin symlinks aren't created on first install. Remove after fix is merged.
    - name: Re-link workspace binaries
      shell: bash
      run: bun install --ignore-scripts

    - name: Start Nx cache server
      if: ${{ inputs.build-target != '' }}
      shell: bash
      run: |
        bun ${{ github.action_path }}/nx-cache-server.ts &
        sleep 1

    - name: Build
      if: ${{ inputs.build-target != '' }}
      shell: bash
      env:
        NX_SELF_HOSTED_REMOTE_CACHE_SERVER: "http://localhost:9876"
        NX_SELF_HOSTED_REMOTE_CACHE_ACCESS_TOKEN: "local"
      run: bunx lerna run ${{ inputs.build-target }}
